name: Instrumented tests

# Espresso/emulator suite (connectedDebugAndroidTest) on a KVM-accelerated
# Android 35 emulator. Deliberately NOT in the push/PR loop: emulator jobs
# are slow (~10 min) and occasionally flaky, and the PR gate must stay fast
# and honest. Runs weekly + on manual dispatch. Note: a red run on the exact
# SHA you then tag WILL block the release gate — that's intended.

on:
  workflow_dispatch:
  schedule:
    # Mondays 05:00 UTC — before the week's work starts.
    - cron: "0 5 * * 1"

permissions:
  contents: read
  # `actions: read` lets the Slack notifier query this run's job/step
  # conclusions to name the step that failed.
  actions: read

jobs:
  connected:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Enable KVM group perms
        # Verbatim from the android-emulator-runner README — hosted runners
        # have /dev/kvm but it's root-only until this udev rule.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest

      - name: Upload connected test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: connected-test-reports
          path: app/build/reports/androidTests/
          if-no-files-found: ignore

      - name: Notify Slack
        if: failure()
        continue-on-error: true
        uses: ./.github/actions/slack-notify
        with:
          status: ${{ job.status }}
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          github-token: ${{ github.token }}
